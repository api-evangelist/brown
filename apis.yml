---
aid: brown
name: Brown University
description: >-
  Brown University is a private Ivy League research university in Providence,
  Rhode Island, ranked #57 in the QS World University Rankings 2025. Its public
  developer and API footprint is centered on the Brown University Library, which
  operates the Brown Digital Repository (BDR) with a documented public REST/search
  API and a IIIF (International Image Interoperability Framework) image and
  presentation service. Brown also runs an InCommon-federated Shibboleth/SAML
  single sign-on identity service and maintains an active "Brown University Library"
  GitHub organization with hundreds of open-source repositories. Most institutional
  systems (SIS, course catalog, internal services) are gated behind Brown
  authentication and are not publicly documented APIs.
